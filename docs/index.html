<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agence IA — Eva Julien</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-mark">EJ</div>
        <div class="logo-text">
          <span class="logo-title">Agence IA</span>
          <span class="logo-sub">Eva Julien</span>
        </div>
      </div>
      <div class="nav-section">
        <p class="nav-label">MES AGENTS</p>
        <div id="agentsList" class="agents-list"></div>
      </div>
      <div class="sidebar-footer">
        <div class="status-dot"></div>
        <span>6 agents actifs</span>
      </div>
    </aside>

    <!-- Overlay mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- MAIN -->
    <main class="main">

      <!-- Barre mobile -->
      <div class="mobile-topbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <span class="mobile-title">Agence IA</span>
      </div>

      <!-- ACCUEIL -->
      <div id="welcomeScreen" class="welcome-screen">
        <div class="welcome-inner">
          <p class="welcome-eyebrow">Agence IA · Eva Julien</p>
          <h2 class="welcome-title">Bonjour Eva 👋</h2>
          <p class="welcome-subtitle">Clique sur un agent pour lui parler ou voir son profil.</p>
          <div id="welcomeCards" class="welcome-cards"></div>
        </div>
      </div>

      <!-- FICHE AGENT + CHAT -->
      <div id="agentScreen" class="agent-screen hidden">

        <!-- Onglets -->
        <div class="tabs">
          <button class="tab active" id="tabProfil" onclick="showTab('profil')">Profil</button>
          <button class="tab" id="tabChat" onclick="showTab('chat')">💬 Chat</button>
<button class="back-btn-top" onclick="goHome()">← Retour</button>
        </div>

        <!-- Contenu Profil -->
        <div id="panelProfil" class="panel">
          <div id="agentContent"></div>
        </div>

        <!-- Contenu Chat -->
        <div id="panelChat" class="panel hidden chat-panel">
          <div class="chat-with-history">
            <div class="chat-main">
              <div class="chat-topbar">
                <button id="historyBtn" class="history-toggle-btn" onclick="toggleHistory()">📋 Historique</button>
                <button class="new-chat-btn" onclick="clearAgentMemory(currentAgent?.id)">+ Nouvelle discussion</button>
              </div>
              <div class="chat-messages" id="chatMessages"></div>
            </div>
            <div id="historyPanel" class="history-panel"></div>
          </div>
          <div class="chat-footer">
            <div class="input-wrapper">
              <textarea id="messageInput" placeholder="Écris ton message ici..." rows="1"></textarea>
              <button id="sendBtn" class="send-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"
                    stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
            <p class="input-hint">Entrée pour envoyer · Maj+Entrée pour un saut de ligne</p>
          </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
